<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ─── API ────────────────────────────────────────────────────────────────────
const API_BASE = 'https://dapejgoi60.execute-api.us-east-1.amazonaws.com/prod';

// ─── Store ───────────────────────────────────────────────────────────────────
const ordersStore = {
  orders: null, loading: false, error: null,
  _listeners: new Set(), _loadPromise: null,
  subscribe(fn) { this._listeners.add(fn); return () => this._listeners.delete(fn); },
  _notify() { this._listeners.forEach(fn => fn()); },
  async load(force = false) {
    if (this._loadPromise && !force) return this._loadPromise;
    this.loading = true; this.error = null; this._notify();
    this._loadPromise = (async () => {
      try {
        const r = await fetch(`${API_BASE}/orders`);
        if (!r.ok) throw new Error('Failed to load orders');
        this.orders = await r.json();
      } catch(e) {
        this.error = e.message || 'Network error';
        this.orders = this.orders || [];
      }
      this.loading = false; this._notify();
    })();
    const p = this._loadPromise;
    p.finally(() => { this._loadPromise = null; });
    return p;
  },
  async create({ description, price }) {
    const r = await fetch(`${API_BASE}/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ description, price: parseFloat(price) }),
    });
    if (!r.ok) throw new Error('Create failed');
    await this.load(true);
  },
  async update(id, { description, price }) {
    const r = await fetch(`${API_BASE}/orders/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ description, price: parseFloat(price) }),
    });
    if (!r.ok) throw new Error('Update failed');
    await this.load(true);
  },
  async remove(id) {
    const r = await fetch(`${API_BASE}/orders/${id}`, { method: 'DELETE' });
    if (!r.ok) throw new Error('Delete failed');
    await this.load(true);
  },
  async subscribeEmail(email) {
    const r = await fetch(`${API_BASE}/notifications/subscribe`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    if (!r.ok) throw new Error('Subscription failed');
  },
  async unsubscribeEmail(email) {
    const r = await fetch(`${API_BASE}/notifications/unsubscribe`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.error || 'Unsubscribe failed');
  },
  async generatePDF() {
    const r = await fetch(`${API_BASE}/orders/summary/pdf`);
    const d = await r.json();
    if (!r.ok) throw new Error('PDF generation failed');
    return d;
  },
  async exportCSV() {
    const r = await fetch(`${API_BASE}/orders/export`);
    const d = await r.json();
    if (!r.ok) throw new Error('CSV export failed');
    return d;
  },
};

function useOrdersStore() {
  const [, force] = useState(0);
  useEffect(() => ordersStore.subscribe(() => force(t => t + 1)), []);
  useEffect(() => { if (ordersStore.orders === null && !ordersStore.loading) ordersStore.load(); }, []);
  return ordersStore;
}

function useToast() {
  const [msg, setMsg] = useState(null);
  const timer = useRef(null);
  const show = useCallback((text, kind = 'ok') => {
    if (timer.current) clearTimeout(timer.current);
    setMsg({ text, kind, id: Date.now() });
    timer.current = setTimeout(() => setMsg(null), 3200);
  }, []);
  return [msg, show];
}

const fmtMoney = n => '$' + (parseFloat(n) || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate  = s => { if (!s) return '—'; const d = new Date(s); return isNaN(d) ? s.slice(0,10) : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); };
const fmtTime  = s => { if (!s) return ''; const d = new Date(s); return isNaN(d) ? '' : d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }); };
const shortId  = id => (id || '').slice(0, 8);

// ─── Spark ───────────────────────────────────────────────────────────────────
function SlateSpark() {
  const hs = [12,18,9,22,16,30,24,20,28,15,32,22,26,30,18,24,33,28,22,20];
  return (
    <svg className="sl-spark" width="120" height="36" viewBox="0 0 120 36" fill="none">
      <defs>
        <linearGradient id="sg" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="currentColor" stopOpacity="0.7"/>
          <stop offset="100%" stopColor="currentColor" stopOpacity="0.15"/>
        </linearGradient>
      </defs>
      {hs.map((h,i) => <rect key={i} x={i*6} y={36-h} width="3.5" height={h} rx="1.5" fill="url(#sg)"/>)}
    </svg>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [dark, setDark] = useState(true);
  const store = useOrdersStore();
  const [tab, setTab]   = useState('orders');
  const [toast, showToast] = useToast();
  const orders = store.orders || [];
  const total  = useMemo(() => orders.reduce((s,o) => s + (parseFloat(o.price)||0), 0), [orders]);
  const avg    = orders.length ? total / orders.length : 0;
  const last24 = useMemo(() => {
    const c = Date.now() - 86400000;
    return orders.filter(o => new Date(o.creation_date).getTime() > c).length;
  }, [orders]);

  return (
    <div className={'sl-root' + (dark ? ' dark' : '')}>
      <style>{slateCSS}</style>

      {/* Top bar */}
      <div className="sl-topbar">
        <div className="sl-logo"><span>ASN</span></div>
        <div className="sl-brand">
          <span className="name">ASN <span style={{color:'var(--sl-mute)',fontWeight:400}}>·</span> Orders</span>
          <span className="sub">workspace · prod</span>
        </div>
        <span className="sl-pill"><span className="dot"></span> Live</span>
        <button className="sl-theme-btn" onClick={() => setDark(d => !d)}>
          {dark ? '☀ Light' : '☾ Dark'}
        </button>
      </div>

      {/* Tabs */}
      <div className="sl-tabs">
        <Tab id="orders" tab={tab} setTab={setTab} badge={orders.length}>Overview</Tab>
        <Tab id="create" tab={tab} setTab={setTab}>New order</Tab>
        <Tab id="notify" tab={tab} setTab={setTab}>Notifications</Tab>
        <Tab id="reports" tab={tab} setTab={setTab}>Reports</Tab>
      </div>

      {/* Content */}
      <div className="sl-content">
        {tab === 'orders'  && <Orders  store={store} orders={orders} total={total} avg={avg} last24={last24} showToast={showToast} />}
        {tab === 'create'  && <Create  store={store} showToast={showToast} onDone={() => setTab('orders')} />}
        {tab === 'notify'  && <Notify  store={store} showToast={showToast} />}
        {tab === 'reports' && <Reports store={store} showToast={showToast} />}
      </div>

      {/* Toast */}
      {toast && (
        <div className={'sl-toast' + (toast.kind === 'err' ? ' err' : '')} key={toast.id}>
          <span className="glyph">{toast.kind === 'err' ? '!' : '✓'}</span>
          {toast.text}
        </div>
      )}
    </div>
  );
}

function Tab({ id, tab, setTab, badge, children }) {
  return (
    <div className={'sl-tab' + (tab === id ? ' active' : '')} onClick={() => setTab(id)}>
      {children}
      {badge != null && <span className="badge">{badge}</span>}
    </div>
  );
}

// ─── Orders ──────────────────────────────────────────────────────────────────
function Orders({ store, orders, total, avg, last24, showToast }) {
  const [editing, setEditing] = useState(null);

  return (
    <>
      {/* Bento stats */}
      <div className="sl-bento">
        <div className="sl-tile big" style={{color:'var(--sl-accent)'}}>
          <div className="k" style={{color:'var(--sl-mute)'}}>Total value</div>
          <div className="v accent">{fmtMoney(total)}</div>
          <div className="delta"><b>+{last24}</b> orders / 24 h</div>
          <SlateSpark />
        </div>
        <div className="sl-tile">
          <div className="k">Total orders</div>
          <div className="v">{store.loading && !store.orders ? '—' : orders.length}</div>
          <div className="delta">all-time</div>
        </div>
        <div className="sl-tile">
          <div className="k">Avg ticket</div>
          <div className="v">{orders.length ? fmtMoney(avg) : '—'}</div>
          <div className="delta">per order</div>
        </div>
        <div className="sl-tile">
          <div className="k">API status</div>
          <div className="v" style={{display:'flex',alignItems:'center',gap:8,fontSize:18}}>
            <span style={{width:10,height:10,borderRadius:'50%',background:'var(--sl-accent)',boxShadow:'0 0 10px var(--sl-accent)',flexShrink:0}}></span>
            Healthy
          </div>
          <div className="delta">us-east-1</div>
        </div>
      </div>

      {/* Table */}
      <div className="sl-panel">
        <div className="sl-panel-head">
          <h2>Orders</h2>
          <span className="desc">live · DynamoDB</span>
          <span className="filler"></span>
          <button className="sl-btn ghost" onClick={() => store.load(true)}>↻ Refresh</button>
        </div>
        <table className="sl-table">
          <thead>
            <tr>
              <th style={{width:100}}>ID</th>
              <th>Description</th>
              <th className="num" style={{width:130}}>Price</th>
              <th style={{width:140}}>Created</th>
              <th style={{width:140}}>Modified</th>
              <th style={{width:110}}></th>
            </tr>
          </thead>
          <tbody>
            {store.loading && !store.orders && (
              <tr><td colSpan="6" className="sl-loading">Loading…</td></tr>
            )}
            {!store.loading && store.error && (
              <tr><td colSpan="6" className="sl-loading" style={{color:'var(--sl-warn)'}}>{store.error}</td></tr>
            )}
            {!store.loading && store.orders && orders.length === 0 && (
              <tr><td colSpan="6" style={{padding:0}}>
                <div className="sl-empty">
                  <div className="glyph">＋</div>
                  <div className="msg">No orders yet. Create one to get started.</div>
                </div>
              </td></tr>
            )}
            {orders.map(o => (
              <tr key={o.order_id}>
                <td><span className="sl-id">{shortId(o.order_id)}</span></td>
                <td className="sl-desc">{o.description}</td>
                <td className="num sl-money">{fmtMoney(o.price)}</td>
                <td className="sl-date">{fmtDate(o.creation_date)}<span className="time">{fmtTime(o.creation_date)}</span></td>
                <td className="sl-date">{fmtDate(o.last_modified)}<span className="time">{fmtTime(o.last_modified)}</span></td>
                <td>
                  <div className="sl-row-actions">
                    <button className="sl-btn icon" onClick={() => setEditing(o)} title="Edit">✎</button>
                    <button className="sl-btn icon danger" title="Delete" onClick={async () => {
                      if (!confirm(`Delete "${o.description}"?\nSubscribers will be notified by email.`)) return;
                      try { await store.remove(o.order_id); showToast('Deleted · email dispatched'); }
                      catch(e) { showToast(e.message, 'err'); }
                    }}>✕</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <div className="sl-meta-strip">
          <span>n = {orders.length}</span>
          <span className="sep">·</span>
          <span>{fmtMoney(total)} total</span>
          <span className="sep">·</span>
          <span>region us-east-1</span>
          <span style={{marginLeft:'auto'}}>sorted by creation date</span>
        </div>
      </div>

      {editing && (
        <EditModal
          order={editing}
          onClose={() => setEditing(null)}
          onSave={async data => {
            try { await store.update(editing.order_id, data); setEditing(null); showToast('Order updated'); }
            catch(e) { showToast(e.message, 'err'); }
          }}
        />
      )}
    </>
  );
}

// ─── Create ──────────────────────────────────────────────────────────────────
function Create({ store, showToast, onDone }) {
  const [desc, setDesc]   = useState('');
  const [price, setPrice] = useState('');
  const [busy, setBusy]   = useState(false);
  return (
    <div className="sl-panel" style={{maxWidth:520}}>
      <div className="sl-panel-head"><h2>New order</h2><span className="desc">POST · /orders</span></div>
      <div className="sl-form">
        <div className="sl-field">
          <label>Description</label>
          <input value={desc} onChange={e => setDesc(e.target.value)} placeholder="e.g. Walnut writing desk" />
          <div className="hint">Short label that identifies the order.</div>
        </div>
        <div className="sl-field">
          <label>Price · USD</label>
          <input type="number" step="0.01" min="0" value={price} onChange={e => setPrice(e.target.value)} placeholder="250.00" />
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="sl-btn ghost" onClick={() => { setDesc(''); setPrice(''); }}>Clear</button>
          <button className="sl-btn primary" disabled={busy} onClick={async () => {
            if (!desc.trim() || !price) return showToast('Both fields required', 'err');
            setBusy(true);
            try { await store.create({ description: desc.trim(), price }); showToast('Order created'); setDesc(''); setPrice(''); onDone && onDone(); }
            catch(e) { showToast(e.message, 'err'); }
            finally { setBusy(false); }
          }}>{busy ? 'Creating…' : 'Create order'}</button>
        </div>
      </div>
    </div>
  );
}

// ─── Notify ──────────────────────────────────────────────────────────────────
function Notify({ store, showToast }) {
  const [subE, setSubE]     = useState('');
  const [unsubE, setUnsubE] = useState('');
  const [busy, setBusy]     = useState(false);
  return (
    <div className="sl-grid-2" style={{maxWidth:800}}>
      <div className="sl-panel">
        <div className="sl-panel-head"><h2>Subscribe</h2><span className="desc">SNS · email</span></div>
        <div className="sl-form">
          <div className="sl-field">
            <label>Email address</label>
            <input type="email" value={subE} onChange={e => setSubE(e.target.value)} placeholder="you@example.com" />
            <div className="hint">A confirmation link will be sent. Click it to activate.</div>
          </div>
          <button className="sl-btn primary" style={{alignSelf:'flex-start'}} disabled={busy} onClick={async () => {
            if (!subE.trim()) return showToast('Email required', 'err');
            setBusy(true);
            try { await store.subscribeEmail(subE.trim()); showToast('Confirmation sent · check your inbox'); setSubE(''); }
            catch(e) { showToast(e.message, 'err'); }
            finally { setBusy(false); }
          }}>Subscribe</button>
        </div>
      </div>
      <div className="sl-panel">
        <div className="sl-panel-head"><h2>Unsubscribe</h2><span className="desc">DELETE</span></div>
        <div className="sl-form">
          <div className="sl-field">
            <label>Email address</label>
            <input type="email" value={unsubE} onChange={e => setUnsubE(e.target.value)} placeholder="you@example.com" />
          </div>
          <button className="sl-btn" style={{alignSelf:'flex-start'}} disabled={busy} onClick={async () => {
            if (!unsubE.trim()) return showToast('Email required', 'err');
            setBusy(true);
            try { await store.unsubscribeEmail(unsubE.trim()); showToast('Removed successfully'); setUnsubE(''); }
            catch(e) { showToast(e.message, 'err'); }
            finally { setBusy(false); }
          }}>Unsubscribe</button>
        </div>
      </div>
    </div>
  );
}

// ─── Reports ─────────────────────────────────────────────────────────────────
function Reports({ store, showToast }) {
  const [pdf, setPdf] = useState(null);
  const [csv, setCsv] = useState(null);
  const [busy, setBusy] = useState(null);
  return (
    <div className="sl-grid-2" style={{maxWidth:800}}>
      <div className="sl-panel">
        <div className="sl-panel-head"><h2>PDF summary</h2><span className="desc">GET · /orders/summary/pdf</span></div>
        <div className="sl-report-card">
          <h3>Deleted orders</h3>
          <p>Generate a printable PDF of every order that has been removed. The signed S3 URL expires in 60 minutes.</p>
          <button className="sl-btn primary" style={{marginTop:14}} disabled={busy === 'pdf'} onClick={async () => {
            setBusy('pdf');
            try { const d = await store.generatePDF(); setPdf(d); showToast('PDF ready'); }
            catch(e) { showToast(e.message, 'err'); }
            finally { setBusy(null); }
          }}>{busy === 'pdf' ? 'Generating…' : 'Generate PDF'}</button>
          {pdf && (
            <div>
              <a className="sl-link" href={pdf.pdf_url} target="_blank" rel="noreferrer">
                ↗ Open summary.pdf <span className="meta">expires 60m</span>
              </a>
            </div>
          )}
        </div>
      </div>
      <div className="sl-panel">
        <div className="sl-panel-head"><h2>CSV export</h2><span className="desc">GET · /orders/export</span></div>
        <div className="sl-report-card">
          <h3>Full orders table</h3>
          <p>UTF-8 CSV with header row — IDs, descriptions, prices, timestamps. Import directly into Excel or Sheets.</p>
          <button className="sl-btn primary" style={{marginTop:14}} disabled={busy === 'csv'} onClick={async () => {
            setBusy('csv');
            try { const d = await store.exportCSV(); setCsv(d); showToast(`CSV · ${d.total_orders} rows`); }
            catch(e) { showToast(e.message, 'err'); }
            finally { setBusy(null); }
          }}>{busy === 'csv' ? 'Exporting…' : 'Export CSV'}</button>
          {csv && (
            <div>
              <a className="sl-link" href={csv.csv_url} target="_blank" rel="noreferrer">
                ↗ {csv.filename || 'orders.csv'} <span className="meta">{csv.total_orders} rows · 60m</span>
              </a>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Edit Modal ───────────────────────────────────────────────────────────────
function EditModal({ order, onClose, onSave }) {
  const [desc, setDesc]   = useState(order.description || '');
  const [price, setPrice] = useState(order.price || '');
  const [busy, setBusy]   = useState(false);
  return (
    <div className="sl-modal-bg" onClick={onClose}>
      <div className="sl-modal" onClick={e => e.stopPropagation()}>
        <div className="sl-modal-head">
          <h3>Edit order</h3>
          <div className="sub">{order.order_id}</div>
        </div>
        <div className="sl-form">
          <div className="sl-field"><label>Description</label><input value={desc} onChange={e => setDesc(e.target.value)} /></div>
          <div className="sl-field"><label>Price · USD</label><input type="number" step="0.01" value={price} onChange={e => setPrice(e.target.value)} /></div>
        </div>
        <div className="sl-modal-foot">
          <button className="sl-btn ghost" onClick={onClose}>Cancel</button>
          <button className="sl-btn primary" disabled={busy} onClick={async () => {
            if (!desc.trim() || !price) return;
            setBusy(true); await onSave({ description: desc.trim(), price }); setBusy(false);
          }}>{busy ? 'Saving…' : 'Save changes'}</button>
        </div>
      </div>
    </div>
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
